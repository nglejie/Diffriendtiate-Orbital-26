services:
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: diffriendtiate-client
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: diffriendtiate-server
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-this-before-deploying}
      DATABASE_URL: postgres://${POSTGRES_USER:-diffriendtiate}:${POSTGRES_PASSWORD:-diffriendtiate_password}@db:5432/${POSTGRES_DB:-diffriendtiate}
    volumes:
      - uploads_data:/app/apps/server/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: diffriendtiate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diffriendtiate}
      POSTGRES_USER: ${POSTGRES_USER:-diffriendtiate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diffriendtiate_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-diffriendtiate} -d ${POSTGRES_DB:-diffriendtiate}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
