services:
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Singapore}
      JWT_SECRET: ${JWT_SECRET:-change-this-before-deploying}
      LLM_API_KEY_ENCRYPTION_KEY: ${LLM_API_KEY_ENCRYPTION_KEY:-diffriendtiate-local-byok-key-change-before-production-2026}
      DATABASE_URL: postgres://${POSTGRES_USER:-diffriendtiate}:${POSTGRES_PASSWORD:-diffriendtiate_password}@db:5432/${POSTGRES_DB:-diffriendtiate}
      CHATBOT_BASE_URL: http://server-chatbot:5000
      INTELLIGRATE_GPU_ENABLED: ${INTELLIGRATE_GPU_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-ci-placeholder}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      OAUTH_PUBLIC_BASE_URL: ${OAUTH_PUBLIC_BASE_URL:-}
      OAUTH_CLIENT_REDIRECT_URL: ${OAUTH_CLIENT_REDIRECT_URL:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_PUBLIC_BASE_URL: ${MICROSOFT_OAUTH_PUBLIC_BASE_URL:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-organizations}
      MICROSOFT_ALLOWED_EMAIL_DOMAINS: ${MICROSOFT_ALLOWED_EMAIL_DOMAINS:-nus.edu.sg,u.nus.edu}
      AUTH_DEV_ACTION_LINKS: ${AUTH_DEV_ACTION_LINKS:-false}
      AUTH_DEV_RESET_LINKS: ${AUTH_DEV_RESET_LINKS:-false}
      AUTH_MAILBOX_URL: ${AUTH_MAILBOX_URL:-http://127.0.0.1:8025}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-Diffriendtiate <no-reply@example.com>}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - uploads_data:/app/apps/server/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diffriendtiate}
      POSTGRES_USER: ${POSTGRES_USER:-diffriendtiate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diffriendtiate_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-diffriendtiate} -d ${POSTGRES_DB:-diffriendtiate}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  server-chatbot:
    build:
      context: ./services/server-chatbot
      dockerfile: Dockerfile
    # ports:
      # - "5000:5000" # Keep for DEV Purposes (remove when deploying)
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Singapore}
      SEARCH_MIN_RELEVANCE: ${SEARCH_MIN_RELEVANCE:-0.35}
      NODE_BASE_URL: ${NODE_BASE_URL:-http://server:4000}
      CHROMA_DIR: ${CHROMA_DIR:-/app/chroma_db}
      GPU_ENABLED: false
      GEMINI_API_KEY: ${GEMINI_API_KEY:-ci-placeholder}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-models/gemini-embedding-001}
      USE_GEMINI_EMBEDDINGS: ${USE_GEMINI_EMBEDDINGS:-false}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${CHATBOT_LOG_FILE:-} # if no log file is set, logs wont be saved to any file
    volumes:
      - chroma_db:${CHROMA_DIR:-/app/chroma_db}
      - chatbot_logs:/app/logs
    restart: unless-stopped

  ollama:
    build:
      context: ./services/ollama
      dockerfile: Dockerfile
    profiles: ["ollama"] # only start when profile is enabled is this service ran
    # ports:
    #   - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 999
      start_period: 10s


volumes:
  postgres_data:
  uploads_data:
  ollama_data:
  chroma_db:
  chatbot_logs:
