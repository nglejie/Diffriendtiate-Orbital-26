name: Deploy Lite Production

on:
  workflow_run:
    workflows: ["App QA Test Suite"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy. Defaults to the workflow commit."
        required: false
        type: string

concurrency:
  group: lite-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy socket-stable lite app
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    environment:
      name: production
    env:
      DEPLOY_REF: ${{ github.event.workflow_run.head_sha || github.event.inputs.ref || github.sha }}
      LITE_APP_DIR: ${{ vars.LITE_APP_DIR || '/opt/diffriendtiate' }}
      LITE_SSH_HOST: ${{ secrets.LITE_SSH_HOST }}
      LITE_SSH_PRIVATE_KEY: ${{ secrets.LITE_SSH_PRIVATE_KEY }}
      LITE_SSH_PORT: ${{ secrets.LITE_SSH_PORT || '22' }}
      LITE_SSH_USER: ${{ secrets.LITE_SSH_USER }}
      LITE_KNOWN_HOSTS: ${{ secrets.LITE_KNOWN_HOSTS }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check deployment configuration
        id: deploy_config
        shell: bash
        run: |
          missing=0
          for name in LITE_SSH_HOST LITE_SSH_PRIVATE_KEY LITE_SSH_USER VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "::error::LITE_SSH_HOST, LITE_SSH_PRIVATE_KEY, LITE_SSH_USER, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY are required for lite deployment."
              exit 1
            fi

            echo "::notice::Lite deploy secrets are not configured; skipping deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout deployment commit
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}
          fetch-depth: 1

      - name: Set up Node.js
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install build dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm ci --include=dev

      - name: Build runtime assets
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm run build

      - name: Verify client auth build
        if: steps.deploy_config.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::notice::VITE_SUPABASE_URL is not set; production deploy must rely on server-side SMTP validation."
            exit 0
          fi

          if ! grep -R --fixed-strings "$VITE_SUPABASE_URL" apps/client/dist/assets >/dev/null; then
            echo "::error::Client bundle was built without the configured Supabase URL."
            exit 1
          fi

      - name: Prepare lite runtime bundle
        if: steps.deploy_config.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          resolved_sha="$(git rev-parse HEAD)"
          archive_path="$RUNNER_TEMP/diffriendtiate-lite-${resolved_sha}.tar.gz"
          tar -czf "$archive_path" \
            package.json \
            package-lock.json \
            apps/server/package.json \
            apps/server/dist \
            apps/client/package.json \
            apps/client/dist \
            services/server-chatbot \
            deploy/lite

          echo "RESOLVED_SHA=$resolved_sha" >> "$GITHUB_ENV"
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Prepare SSH
        if: steps.deploy_config.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$LITE_SSH_PRIVATE_KEY" > "$HOME/.ssh/lite_deploy_key"
          chmod 600 "$HOME/.ssh/lite_deploy_key"

          if [ -n "$LITE_KNOWN_HOSTS" ]; then
            printf '%s\n' "$LITE_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            echo "::warning::LITE_KNOWN_HOSTS is not set; trusting ssh-keyscan for this run."
            ssh-keyscan -p "$LITE_SSH_PORT" "$LITE_SSH_HOST" > "$HOME/.ssh/known_hosts"
          fi
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload and deploy release
        if: steps.deploy_config.outputs.ready == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh_target="${LITE_SSH_USER}@${LITE_SSH_HOST}"
          remote_release="${LITE_APP_DIR}/releases/${RESOLVED_SHA}"
          remote_archive="${LITE_APP_DIR}/releases/${RESOLVED_SHA}.tar.gz"

          ssh_common=(
            -i "$HOME/.ssh/lite_deploy_key"
            -p "$LITE_SSH_PORT"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )

          ssh "${ssh_common[@]}" "$ssh_target" \
            "mkdir -p '${LITE_APP_DIR}/releases' '${LITE_APP_DIR}/shared' '${LITE_APP_DIR}/backups'"

          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            secret_file="$RUNNER_TEMP/supabase_service_role_key"
            helper_script="$RUNNER_TEMP/update_supabase_service_role.py"
            trap 'rm -f "$secret_file" "$helper_script"' EXIT
            umask 077
            printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" > "$secret_file"
            cat > "$helper_script" <<'PY'
          from pathlib import Path
          import os

          app_dir = Path(os.environ['LITE_APP_DIR'])
          env_file = app_dir / 'shared' / '.env'
          secret_file = app_dir / 'shared' / '.supabase_service_role_key.tmp'
          helper_file = app_dir / 'shared' / 'update_supabase_service_role.py'

          try:
              key = secret_file.read_text(encoding='utf-8').strip()
              if not key:
                  raise SystemExit('SUPABASE_SERVICE_ROLE_KEY secret was empty.')

              lines = env_file.read_text(encoding='utf-8').splitlines() if env_file.exists() else []
              output = []
              replaced = False

              for line in lines:
                  if line.startswith('SUPABASE_SERVICE_ROLE_KEY='):
                      output.append(f'SUPABASE_SERVICE_ROLE_KEY={key}')
                      replaced = True
                  else:
                      output.append(line)

              if not replaced:
                  output.append(f'SUPABASE_SERVICE_ROLE_KEY={key}')

              env_file.write_text('\n'.join(output).rstrip() + '\n', encoding='utf-8')
              env_file.chmod(0o600)
          finally:
              secret_file.unlink(missing_ok=True)
              helper_file.unlink(missing_ok=True)

          print('Updated server-only Supabase key in production env.')
          PY

            scp \
              -i "$HOME/.ssh/lite_deploy_key" \
              -P "$LITE_SSH_PORT" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "$secret_file" \
              "$ssh_target:${LITE_APP_DIR}/shared/.supabase_service_role_key.tmp"
            rm -f "$secret_file"

            scp \
              -i "$HOME/.ssh/lite_deploy_key" \
              -P "$LITE_SSH_PORT" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "$helper_script" \
              "$ssh_target:${LITE_APP_DIR}/shared/update_supabase_service_role.py"

            ssh "${ssh_common[@]}" "$ssh_target" \
              "LITE_APP_DIR='${LITE_APP_DIR}' python3 '${LITE_APP_DIR}/shared/update_supabase_service_role.py'"
          fi

          scp \
            -i "$HOME/.ssh/lite_deploy_key" \
            -P "$LITE_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$ARCHIVE_PATH" \
            "$ssh_target:$remote_archive"

          ssh "${ssh_common[@]}" "$ssh_target" \
            "set -euo pipefail; \
             rm -rf '${remote_release}.tmp'; \
             mkdir -p '${remote_release}.tmp'; \
             tar -xzf '$remote_archive' -C '${remote_release}.tmp'; \
             rm -rf '$remote_release'; \
             mv '${remote_release}.tmp' '$remote_release'; \
             rm -f '$remote_archive'; \
             APP_DIR='$LITE_APP_DIR' bash '$remote_release/deploy/lite/deploy-release.sh' '$RESOLVED_SHA'"
