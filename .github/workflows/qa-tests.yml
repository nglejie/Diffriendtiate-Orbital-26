name: App QA Test Suite

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "services/**"
      - "tests/**"
      - "docker-compose*.yaml"
      - "docker-compose*.yml"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "!**.md"

  push:
    branches: [main]
    paths:
      - "apps/**"
      - "services/**"
      - "tests/**"
      - "docker-compose*.yaml"
      - "docker-compose*.yml"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "!**.md"

  workflow_dispatch:

concurrency:
  group: app-qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  app-qa:
    name: Build, Test, Browser UAT, and Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      CHROMA_DIR: /app/chroma_db
      GEMINI_API_KEY: ci-placeholder
      GEMINI_MODEL: gemini-3.1-flash-lite
      GEMINI_EMBED_MODEL: models/gemini-embedding-2
      INTELLIGRATE_GPU_ENABLED: "false"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build and reproducibility checks
        if: always()
        run: npm run test:build

      - name: Unit and component tests
        if: always()
        run: npm run test:unit

      - name: API and integration tests
        if: always()
        run: npm run test:integration

      - name: AI and reliability tests
        if: always()
        run: npm run test:ai

      - name: Performance smoke tests
        if: always()
        run: npm run test:performance

      - name: Security checks
        if: always()
        run: npm run test:security

      - name: End-to-end UAT tests
        if: always()
        run: npm run test:e2e

      - name: Build Docker Compose images
        id: docker_build
        if: always()
        run: docker compose -f docker-compose.yaml build client server server-chatbot

      - name: Start Docker Compose app stack
        id: docker_up
        if: steps.docker_build.outcome == 'success'
        run: docker compose -f docker-compose.yaml up -d db server-chatbot server client

      - name: Wait for Docker Compose app
        id: docker_wait
        if: steps.docker_up.outcome == 'success'
        run: |
          for i in {1..90}; do
            if curl --fail --silent --show-error http://127.0.0.1:4000/ >/dev/null \
              && curl --fail --silent --show-error http://127.0.0.1:4000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yaml ps
          docker compose -f docker-compose.yaml logs --tail=200
          exit 1

      - name: Check Docker Compose chatbot health
        if: steps.docker_wait.outcome == 'success'
        run: |
          docker compose -f docker-compose.yaml exec -T server-chatbot python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:5000/health", timeout=10) as response:
              payload = json.loads(response.read().decode("utf-8"))

          assert payload.get("message") == "Success", payload
          PY

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: tests/.tmp/playwright-report
          if-no-files-found: ignore

      - name: Print Docker Compose logs on failure
        if: failure()
        run: |
          mkdir -p tests/.tmp
          docker compose -f docker-compose.yaml ps | tee tests/.tmp/docker-compose-logs.txt
          docker compose -f docker-compose.yaml logs --tail=300 | tee -a tests/.tmp/docker-compose-logs.txt

      - name: Upload Docker Compose logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: docker-compose-logs
          path: tests/.tmp/docker-compose-logs.txt
          if-no-files-found: ignore

      - name: Stop Docker Compose app stack
        if: always()
        run: docker compose -f docker-compose.yaml down -v --remove-orphans
