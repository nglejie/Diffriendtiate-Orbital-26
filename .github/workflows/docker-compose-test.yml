name: Docker Compose Test (Build and test the app)

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "services/**"
      - "docker-compose.yaml"
      - "!**.md"
      - "!services/server-chatbot/static/**"
      - "!.drawio"
      
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "services/**"
      - "docker-compose.yaml"
      - "!**.md"
      - "!services/server-chatbot/static/**"
      - "!.drawio"

jobs:
  test:
    runs-on: ubuntu-latest
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Typecheck and build app
      run: npm run check

    - name: Run client unit tests
      run: npm run test:unit

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    - name: Create .env
      run: cp .env.example .env

    - name: Build containers
      run: docker compose build

    - name: Start Container
      run: docker compose up -d

    - name: Wait for app
      run: |
        for i in {1..90}; do
          if curl --fail --silent --show-error http://127.0.0.1:4000/api/health >/dev/null && curl --fail --silent --show-error http://127.0.0.1:4000/ >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        docker compose logs --tail=200
        exit 1

    - name: Run API integration tests
      run: npm run test:integration

    - name: Run browser E2E tests
      run: npm run test:e2e

    - name: on fail
      if: failure()
      run: docker compose logs --tail=200

    - name: Shutdown
      if: always()
      run: docker compose down -v
