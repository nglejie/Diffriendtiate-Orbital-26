name: Docker Compose Smoke Test

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/docker-compose-test.yml"
      - ".env.example"
      - "apps/client/Dockerfile"
      - "apps/client/nginx.conf"
      - "apps/client/package.json"
      - "apps/server/Dockerfile"
      - "apps/server/package.json"
      - "services/**"
      - "docker-compose.yaml"
      - "package.json"
      - "package-lock.json"
      - "!**.md"
      - "!services/server-chatbot/static/**"
      - "!.drawio"
      
  push:
    branches: [main]
    paths:
      - ".github/workflows/docker-compose-test.yml"
      - ".env.example"
      - "apps/client/Dockerfile"
      - "apps/client/nginx.conf"
      - "apps/client/package.json"
      - "apps/server/Dockerfile"
      - "apps/server/package.json"
      - "services/**"
      - "docker-compose.yaml"
      - "package.json"
      - "package-lock.json"
      - "!**.md"
      - "!services/server-chatbot/static/**"
      - "!.drawio"

jobs:
  test:
    runs-on: ubuntu-latest
  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create .env
      run: cp .env.example .env

    - name: Build containers
      run: docker compose build

    - name: Start Container
      run: docker compose up -d

    - name: Wait for app
      run: |
        for i in {1..90}; do
          if curl --fail --silent --show-error http://127.0.0.1:4000/api/health >/dev/null && curl --fail --silent --show-error http://127.0.0.1:4000/ >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        docker compose logs --tail=200
        exit 1

    - name: on fail
      if: failure()
      run: docker compose logs --tail=200

    - name: Shutdown
      if: always()
      run: docker compose down -v
